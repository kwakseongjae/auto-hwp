# 정적 데모(GitHub Pages) 배포 — **수동 전용**(workflow_dispatch, 이 레포 CI 원칙).
#
# apps/hwp-lab 을 서버 없는 정적 사이트로 빌드해 Pages 에 올린다:
#   wasm 빌드(rust+wasm-bindgen) → JS 패키지 dist → build-demo.mjs(api/ 임시 제외 + output:"export")
# 클라이언트는 NEXT_PUBLIC_DEMO=1 로 "정적 데모" 모드(AI 편집은 로컬 실행 안내, 나머지 전부 동작).
#
# 선행 1회 설정: 레포 Settings → Pages → Source = "GitHub Actions".
name: deploy-demo

on:
  workflow_dispatch:
    inputs:
      base_path:
        description: "배포 basePath (프로젝트 페이지면 /auto-hwp, 커스텀 도메인이면 빈 값)"
        type: string
        default: "/auto-hwp"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-demo
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # external/rhwp — engine wasm 빌드(cargo resolve)에 필요

      # engine 의 build-wasm.mjs 가 쓰는 툴체인(publish.yml 과 동일 — wasm-bindgen 은 Cargo.lock 과 정확히 일치).
      - uses: dtolnay/rust-toolchain@1.95
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: install wasm-bindgen-cli (=0.2.125)
        run: cargo install wasm-bindgen-cli --version 0.2.125 --locked

      # 최신 binaryen 공식 릴리스 사용 — apt 는 108(2022)이라 최신 rustc wasm 에서 wasm-opt 가 실패해
      # 조용히 미적용됐다(2026-07-22 실측: 배포/발행본 11.4MB vs 로컬 8.07MB). 119 로 고정 설치.
      - name: install binaryen (wasm-opt -Oz 다이어트)
        run: |
          curl -sL https://github.com/WebAssembly/binaryen/releases/download/version_119/binaryen-version_119-x86_64-linux.tar.gz | tar xz -C /tmp
          echo "/tmp/binaryen-version_119/bin" >> "$GITHUB_PATH"
          /tmp/binaryen-version_119/bin/wasm-opt --version
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # hwp-lab 의 build:deps 는 pnpm -C 로 각 패키지를 빌드한다(레포 관례).
      - name: install pnpm
        run: npm i -g pnpm

      # 1) 엔진 wasm → packages/engine/pkg (hwp-lab prebuild 의 copy-wasm.mjs 가 이걸 복사한다)
      - name: build @auto-hwp/engine (wasm)
        working-directory: packages/engine
        run: |
          npm install --no-audit --no-fund
          npm run build

      # 2) JS 패키지: install → build 를 의존 순서대로. ⚠️ pnpm 의 `file:` 의존은 심링크가 아니라
      #    **설치 시점 스냅샷**(files 필드 반영) — react 를 editor-core dist 생성 전에 install 하면
      #    빈 패키지가 복사되어 vite 가 "Failed to resolve entry" 로 죽는다(1차 배포 실패 실측;
      #    publish.yml 의 "install 은 앞 단계 dist 생성 후" 원칙과 동일).
      - name: build JS package deps (install after dist exists)
        run: |
          pnpm -C packages/ai-protocol install && pnpm -C packages/ai-protocol build
          pnpm -C packages/editor-core install && pnpm -C packages/editor-core build
          pnpm -C packages/react install

      # 3) 정적 데모 빌드 — prebuild(deps+wasm/fonts/samples 복사) → api/ 임시 제외 → output:"export"
      - name: build static demo
        working-directory: apps/hwp-lab
        env:
          DEMO_BASE_PATH: ${{ inputs.base_path }}
        run: |
          npm install --no-audit --no-fund
          npm run build:demo
          touch out/.nojekyll   # _next/ 가 Jekyll 규칙에 걸리지 않도록

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/hwp-lab/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
