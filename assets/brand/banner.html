<!doctype html><meta charset="utf-8">
<!-- 오토한글(auto-hwp) 브랜드 배너 v2 — 렌더: node assets/brand/shot.mjs → autohwp-banner.png
     v2 컨셉: "실제 제품 샷" — 엔진이 그린 진짜 정부양식 페이지(own-render SVG) 위에 AI 대화가
     떠 있는 장면. 타이포(나눔고딕 Bold, OFL) + AI 캐럿 + 실렌더 + 채팅/카드 모티프. -->
<style>
@font-face { font-family: NG; src: url("../fonts/NanumGothic-Bold.ttf"); font-weight: 700; }
@font-face { font-family: NG; src: url("../fonts/NanumGothic-Regular.ttf"); font-weight: 400; }
* { margin: 0; box-sizing: border-box; }
body { width: 1280px; height: 520px; overflow: hidden; font-family: NG, sans-serif;
  background: #07090d; position: relative; color: #e6e9ef; }
.rules { position: absolute; inset: 0;
  background-image: repeating-linear-gradient(0deg, transparent 0 43px, rgba(230,233,239,0.04) 43px 44px); }
.glow { position: absolute; width: 900px; height: 900px; right: -220px; top: -320px; border-radius: 50%;
  background: radial-gradient(circle, rgba(124,58,237,0.30), transparent 60%); }
.glow2 { position: absolute; width: 640px; height: 640px; left: -240px; bottom: -380px; border-radius: 50%;
  background: radial-gradient(circle, rgba(37,99,235,0.16), transparent 60%); }
/* ── 좌: 워드마크 ─────────────────────────────────────────── */
.wrap { position: absolute; left: 84px; top: 96px; z-index: 3; }
.kicker { font-size: 20px; letter-spacing: 6px; color: #8b93a1; }
.kicker b { color: #a78bfa; font-weight: 700; }
.mark { margin-top: 16px; font-size: 138px; font-weight: 700; letter-spacing: -3px; line-height: 1.02;
  background: linear-gradient(115deg, #ffffff 55%, #c4b5fd 88%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  display: flex; align-items: baseline; filter: drop-shadow(0 6px 30px rgba(124,58,237,0.25)); }
.caret { display: inline-block; width: 32px; height: 112px; margin-left: 20px; border-radius: 6px;
  background: linear-gradient(180deg, #a78bfa, #6d28d9); align-self: center; margin-top: 12px;
  box-shadow: 0 0 42px rgba(124, 58, 237, 0.8), 0 0 90px rgba(124,58,237,0.35); }
.tag { margin-top: 30px; font-size: 31px; color: #eef1f6; font-weight: 700; letter-spacing: 0.2px; }
.sub { margin-top: 14px; font-size: 19px; color: #78818f; letter-spacing: 0.4px; line-height: 1.55; }
.sub b { color: #b8c0cc; }
.badges { position: absolute; left: 84px; bottom: 44px; display: flex; gap: 10px; z-index: 3; }
.badges span { font-size: 14.5px; padding: 7px 14px; border-radius: 999px; background: rgba(124,58,237,0.10);
  border: 1px solid rgba(124,58,237,0.35); color: #c4b5fd; letter-spacing: 0.5px; }
.badges span.g { background: rgba(16,185,129,0.10); border-color: rgba(16,185,129,0.35); color: #6ee7b7; }
/* ── 우: 실렌더 문서 + AI 대화 ────────────────────────────── */
.stage { position: absolute; right: -30px; top: 30px; width: 560px; height: 520px; z-index: 2;
  perspective: 1400px; }
.page { position: absolute; right: 70px; top: 24px; width: 430px; background: #fff; border-radius: 6px;
  overflow: hidden; transform: rotateY(-14deg) rotateX(4deg) rotate(1.5deg);
  box-shadow: -30px 40px 90px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.06),
    -8px 0 60px rgba(124,58,237,0.18); }
.page img { display: block; width: 100%; }
.page .shade { position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 55%, rgba(12,15,20,0.55) 100%); }
.bubble { position: absolute; z-index: 4; border-radius: 14px; padding: 13px 17px; font-size: 15.5px;
  box-shadow: 0 14px 44px rgba(0,0,0,0.5); letter-spacing: 0.2px; }
.user { right: 388px; top: 96px; background: #1b2330; border: 1px solid #2a3546; color: #dfe5ee;
  border-bottom-right-radius: 4px; }
.ai { right: 96px; bottom: 116px; width: 330px; background: #141925; border: 1px solid #262d3d;
  border-bottom-left-radius: 4px; }
.ai .h { display: flex; align-items: center; gap: 8px; font-size: 15px; color: #cdd4de; }
.ai .h .ic { color: #a78bfa; }
.ai .h .loc { margin-left: auto; font-size: 11.5px; color: #a78bfa; background: rgba(124,58,237,0.16);
  padding: 2px 9px; border-radius: 999px; }
.ai .b { margin-top: 8px; font-size: 13.5px; color: #8b93a1; line-height: 1.5; }
.ai .a { margin-top: 10px; display: flex; gap: 8px; }
.ai .a span { font-size: 12.5px; padding: 5px 13px; border-radius: 8px; }
.ai .ok { background: #7c3aed; color: #fff; box-shadow: 0 4px 18px rgba(124,58,237,0.45); }
.ai .no { background: #1c2230; color: #8b93a1; }
/* 문서 위 하이라이트 박스(위치 보기 모티프) */
.hl { position: absolute; z-index: 3; right: 210px; top: 236px; width: 200px; height: 46px;
  border: 2.5px solid #7c3aed; border-radius: 4px; background: rgba(124,58,237,0.16);
  box-shadow: 0 0 26px rgba(124,58,237,0.5); transform: rotate(1.5deg); }
</style>
<div class="rules"></div><div class="glow"></div><div class="glow2"></div>
<div class="stage">
  <div class="page"><img src="render-p0.svg"><div class="shade"></div></div>
</div>
<div class="hl"></div>
<div class="bubble user">"사업 개요 표 채워줘"</div>
<div class="bubble ai">
  <div class="h"><span class="ic">✦</span> 표 채우기 제안 <span class="loc">s0·b3 ⊙ 위치 보기</span></div>
  <div class="b">빈 값칸 6곳을 채웠습니다 — 라벨은 건드리지 않았어요. 적용할까요?</div>
  <div class="a"><span class="ok">✓ 적용</span><span class="no">되돌리기</span></div>
</div>
<div class="wrap">
  <div class="kicker"><b>AUTO-HWP</b> · SELF-OWNED HWP ENGINE</div>
  <div class="mark">오토한글<span class="caret"></span></div>
  <div class="tag">AI와 함께, 한 화면을 보면서 쓰는 한글</div>
  <div class="sub">AI가 <b>읽는 문서</b>와 <b>화면에 그려지는 문서</b>가 같은 엔진에서 나옵니다 —<br>
  그래서 말로 고친 편집이 검증되고, 한글에서 그대로 열립니다.</div>
</div>
<div class="badges">
  <span class="g">한컴 쪽수 일치 8==8 · 18==18</span><span>줄바꿈 98.9%</span>
  <span>실물 공공문서 49종</span><span class="g">100% 로컬 · 7.3MB wasm</span>
</div>
